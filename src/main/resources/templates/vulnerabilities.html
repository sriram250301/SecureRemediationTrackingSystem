<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Vulnerabilities – Remediation Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" th:href="@{/dashboard}">🛡️ Remediation Tracker</a>
    <div class="d-flex align-items-center gap-3">
        <span class="text-white">Hello, <strong sec:authentication="name"></strong></span>
        <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">Dashboard</a>
        <a th:href="@{/audit}" class="btn btn-outline-light btn-sm">Audit Logs</a>
        <form th:action="@{/logout}" method="post" class="m-0">
            <button class="btn btn-outline-danger btn-sm" type="submit">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Vulnerabilities</h3>
        <!--
            Only ADMIN and ANALYST can create — matches your RBAC:
            /analyst/** → hasAnyRole('ADMIN', 'ANALYST')
        -->
        <a th:href="@{/vulnerabilities/new}" class="btn btn-success"
           sec:authorize="hasAnyRole('ADMIN', 'ANALYST')">+ New Vulnerability</a>
    </div>

    <!-- Success message shown after create/update -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <!-- The vulnerabilities table -->
    <table class="table table-bordered table-hover bg-white">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Severity</th>
                <th>Status</th>
                <th>Assigned To</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <!--
                th:each="vuln : ${vulnerabilities}" → loops over the 'vulnerabilities' list
                the controller adds: model.addAttribute("vulnerabilities", list)
            -->
            <tr th:each="vuln : ${vulnerabilities}">
                <td th:text="${vuln.id}"></td>
                <td th:text="${vuln.title}"></td>

                <!-- Colour-code severity badges -->
                <td>
                    <span th:text="${vuln.severity}"
                          th:classappend="${vuln.severity == 'CRITICAL'} ? 'badge bg-danger' :
                                          (${vuln.severity == 'HIGH'} ? 'badge bg-warning text-dark' :
                                          (${vuln.severity == 'MEDIUM'} ? 'badge bg-info text-dark' : 'badge bg-secondary'))">
                    </span>
                </td>

                <td>
                    <span th:text="${vuln.status}"
                          th:classappend="${vuln.status == 'OPEN'} ? 'badge bg-danger' :
                                          (${vuln.status == 'IN_PROGRESS'} ? 'badge bg-warning text-dark' : 'badge bg-success')">
                    </span>
                </td>

                <!--
                    Safe null check: if assignedTo is null, show 'Unassigned'
                    th:text="${vuln.assignedTo != null ? vuln.assignedTo.username : 'Unassigned'}"
                -->
                <td th:text="${vuln.assignedTo != null ? vuln.assignedTo.username : 'Unassigned'}"></td>

                <td>
                    <!-- View detail -->
                    <a th:href="@{/vulnerabilities/{id}(id=${vuln.id})}" class="btn btn-sm btn-outline-primary">View</a>

                    <!-- Edit — ADMIN can edit all; others only see this for their own (controller enforces the actual check) -->
                    <a th:href="@{/vulnerabilities/{id}/edit(id=${vuln.id})}" class="btn btn-sm btn-outline-secondary"
                       sec:authorize="hasAnyRole('ADMIN', 'ANALYST')">Edit</a>

                    <!-- Delete — ADMIN only -->
                    <form th:action="@{/vulnerabilities/{id}/delete(id=${vuln.id})}" method="post"
                          style="display:inline;"
                          sec:authorize="hasRole('ADMIN')"
                          onsubmit="return confirm('Delete this vulnerability?')">
                        <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                    </form>
                </td>
            </tr>

            <!-- Show message if list is empty -->
            <tr th:if="${#lists.isEmpty(vulnerabilities)}">
                <td colspan="6" class="text-center text-muted">No vulnerabilities found.</td>
            </tr>
        </tbody>
    </table>

</div>
</body>
</html>
