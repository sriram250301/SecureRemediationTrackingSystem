<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login – Remediation Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow" style="width: 400px;">
        <div class="card-body p-4">

            <h4 class="card-title text-center mb-4">🔐 Remediation Tracker</h4>

            <!-- Show error message if login failed -->
            <div th:if="${param.error}" class="alert alert-danger">
                Invalid username or password.
            </div>

            <!-- Show logout success message -->
            <div th:if="${param.logout}" class="alert alert-success">
                You have been logged out.
            </div>

            <!--
                th:action="@{/login}" → Thymeleaf generates the correct URL for the form POST
                Spring Security listens on POST /login by default
            -->
            <form th:action="@{/login}" method="post">

                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <!--
                        name="username" and name="password" are REQUIRED exactly like this.
                        Spring Security reads these field names automatically.
                    -->
                    <input type="text" class="form-control" id="username" name="username" required autofocus>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>

            <hr>
            <p class="text-center mb-0">
                No account? <a th:href="@{/register}">Register</a>
            </p>
        </div>
    </div>
</div>

</body>
</html>
