<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>User Management – Remediation Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" th:href="@{/dashboard}">🛡️ Remediation Tracker</a>
    <div class="d-flex align-items-center gap-3">
        <span class="text-white">Hello, <strong sec:authentication="name"></strong></span>
        <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">Dashboard</a>
        <a th:href="@{/vulnerabilities}" class="btn btn-outline-light btn-sm">Vulnerabilities</a>
        <a th:href="@{/audit}" class="btn btn-outline-light btn-sm">Audit Logs</a>
        <form th:action="@{/logout}" method="post" class="m-0">
            <button class="btn btn-outline-danger btn-sm" type="submit">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>👤 User Management</h3>
        <!-- Button to show the create user panel -->
        <button class="btn btn-success" type="button" data-bs-toggle="collapse"
                data-bs-target="#createUserPanel">+ New User</button>
    </div>

    <!-- Success / error flash messages -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}"   class="alert alert-danger"  th:text="${errorMessage}"></div>

    <!-- ── CREATE USER PANEL (collapsed by default) ─────────────────── -->
    <!--
        This is a Bootstrap collapse — clicking the button above toggles it.
        It posts to /admin/users/create which is handled in AdminController.
    -->
    <div class="collapse mb-4" id="createUserPanel">
        <div class="card card-body">
            <h5 class="mb-3">Create New User</h5>
            <form th:action="@{/admin/users/create}" th:object="${newUser}" method="post">
                <div class="row g-2">
                    <div class="col-md-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" th:field="*{username}" required>
                        <span class="text-danger small" th:if="${#fields.hasErrors('username')}"
                              th:errors="*{username}"></span>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" th:field="*{email}" required>
                        <span class="text-danger small" th:if="${#fields.hasErrors('email')}"
                              th:errors="*{email}"></span>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" th:field="*{password}" required>
                        <span class="text-danger small" th:if="${#fields.hasErrors('password')}"
                              th:errors="*{password}"></span>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Role</label>
                        <select class="form-select" th:field="*{role}" required>
                            <option value="">-- Role --</option>
                            <option value="ADMIN">Admin</option>
                            <option value="ANALYST">Analyst</option>
                            <option value="DEVELOPER">Developer</option>
                        </select>
                    </div>
                    <div class="col-md-1 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">Add</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- ── USERS TABLE ───────────────────────────────────────────────── -->
    <table class="table table-bordered table-hover bg-white">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Role</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <!--
                th:each loops over the 'users' list from:
                model.addAttribute("users", userRepo.findAll())
            -->
            <tr th:each="u : ${users}">
                <td th:text="${u.id}"></td>
                <td th:text="${u.username}"></td>
                <td th:text="${u.email}"></td>
                <td>
                    <!--
                        Colour the role badge: ADMIN=red, ANALYST=blue, DEVELOPER=green
                    -->
                    <span th:text="${u.role}"
                          th:classappend="${u.role.name() == 'ADMIN'}    ? 'badge bg-danger'  :
                                          (${u.role.name() == 'ANALYST'} ? 'badge bg-primary' : 'badge bg-success')">
                    </span>
                </td>
                <td>
                    <!-- ── CHANGE ROLE inline form ── -->
                    <!--
                        This posts to /admin/users/{id}/role with a 'role' param.
                        We use a small inline form so each row has its own submit.
                    -->
                    <form th:action="@{/admin/users/{id}/role(id=${u.id})}" method="post"
                          class="d-inline-flex gap-1">
                        <select name="role" class="form-select form-select-sm" style="width:130px;">
                            <option value="ADMIN"     th:selected="${u.role.name() == 'ADMIN'}">Admin</option>
                            <option value="ANALYST"   th:selected="${u.role.name() == 'ANALYST'}">Analyst</option>
                            <option value="DEVELOPER" th:selected="${u.role.name() == 'DEVELOPER'}">Developer</option>
                        </select>
                        <button type="submit" class="btn btn-sm btn-outline-secondary">Update Role</button>
                    </form>

                    <!-- ── DELETE user ── -->
                    <!--
                        onsubmit confirm() shows a browser dialog before deleting.
                        The controller prevents deleting your own account.
                    -->
                    <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post"
                          class="d-inline"
                          onsubmit="return confirm('Delete this user? This cannot be undone.')">
                        <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                    </form>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(users)}">
                <td colspan="5" class="text-center text-muted">No users found.</td>
            </tr>
        </tbody>
    </table>

</div>

<!-- Bootstrap JS for the collapse panel -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
