<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Audit Logs – Remediation Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" th:href="@{/dashboard}">🛡️ Remediation Tracker</a>
    <div class="d-flex align-items-center gap-3">
        <span class="text-white">Hello, <strong sec:authentication="name"></strong></span>
        <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">Dashboard</a>
        <a th:href="@{/vulnerabilities}" class="btn btn-outline-light btn-sm">Vulnerabilities</a>
        <form th:action="@{/logout}" method="post" class="m-0">
            <button class="btn btn-outline-danger btn-sm" type="submit">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-4">

    <h3>📜 Audit Logs</h3>
    <p class="text-muted">All system actions are recorded here.</p>

    <table class="table table-bordered table-hover bg-white">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>User</th>
                <th>Action</th>
                <th>Target Type</th>
                <th>Target ID</th>
                <th>Timestamp</th>
            </tr>
        </thead>
        <tbody>
            <!--
                th:each loops over 'logs' list from: model.addAttribute("logs", auditRepo.findAll())
                th:text fills each cell with the corresponding field value
            -->
            <tr th:each="log : ${logs}">
                <td th:text="${log.id}"></td>
                <td th:text="${log.username}"></td>

                <!-- Colour code the action type for readability -->
                <td>
                    <span th:text="${log.action}"
                          th:classappend="${log.action == 'CREATE'} ? 'badge bg-success' :
                                          (${log.action == 'UPDATE'} ? 'badge bg-warning text-dark' :
                                          (${log.action == 'DELETE'} ? 'badge bg-danger' : 'badge bg-secondary'))">
                    </span>
                </td>

                <td th:text="${log.targetType}"></td>
                <td th:text="${log.targetId}"></td>

                <!--
                    #temporals.format → Thymeleaf utility to format LocalDateTime nicely
                    format: "dd MMM yyyy HH:mm:ss"
                -->
                <td th:text="${#temporals.format(log.timestamp, 'dd MMM yyyy HH:mm:ss')}"></td>
            </tr>

            <tr th:if="${#lists.isEmpty(logs)}">
                <td colspan="6" class="text-center text-muted">No audit logs yet.</td>
            </tr>
        </tbody>
    </table>

</div>
</body>
</html>
