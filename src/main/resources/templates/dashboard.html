<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Dashboard – Remediation Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">🛡️ Remediation Tracker</span>
    <div class="d-flex align-items-center gap-3">
        <!--
            sec:authentication="name" → prints the logged-in user's username
            This comes from the Thymeleaf Spring Security extras dependency
        -->
        <span class="text-white">Hello, <strong sec:authentication="name"></strong></span>
        <a th:href="@{/vulnerabilities}" class="btn btn-outline-light btn-sm">Vulnerabilities</a>
        <a th:href="@{/audit}" class="btn btn-outline-light btn-sm">Audit Logs</a>
        <!--
            sec:authorize="hasRole('ADMIN')" → only shows this link to ADMIN users
            ANALYST and DEVELOPER will not see it at all
        -->
        <a th:href="@{/admin/users}" class="btn btn-outline-warning btn-sm"
           sec:authorize="hasRole('ADMIN')">Manage Users</a>
        <!-- Logout is a POST for security (CSRF protection) -->
        <form th:action="@{/logout}" method="post" class="m-0">
            <button class="btn btn-outline-danger btn-sm" type="submit">Logout</button>
        </form>
    </div>
</nav>

<!-- ===== MAIN CONTENT ===== -->
<div class="container mt-4">

    <h3>Dashboard</h3>
    <p class="text-muted">Welcome back. Here's a summary of the current vulnerability status.</p>

    <!-- Summary cards — values come from the controller via model attributes -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card text-white bg-secondary">
                <div class="card-body">
                    <h6 class="card-title">Total</h6>
                    <!--
                        th:text="${totalCount}" → replaced with the value of 'totalCount'
                        that the controller added to the model: model.addAttribute("totalCount", ...)
                    -->
                    <h2 th:text="${totalCount}">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-danger">
                <div class="card-body">
                    <h6 class="card-title">Critical</h6>
                    <h2 th:text="${criticalCount}">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-warning">
                <div class="card-body">
                    <h6 class="card-title">High</h6>
                    <h2 th:text="${highCount}">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-success">
                <div class="card-body">
                    <h6 class="card-title">Resolved</h6>
                    <h2 th:text="${resolvedCount}">0</h2>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick links -->
    <div class="d-flex gap-2">
        <a th:href="@{/vulnerabilities}" class="btn btn-primary">View All Vulnerabilities</a>
        <!--
            Only ADMIN and ANALYST can create vulnerabilities (matches your RBAC rules)
        -->
        <a th:href="@{/vulnerabilities/new}" class="btn btn-success"
           sec:authorize="hasAnyRole('ADMIN', 'ANALYST')">+ New Vulnerability</a>
    </div>

</div>
</body>
</html>
