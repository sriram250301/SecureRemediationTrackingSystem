<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Dashboard – Remediation Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">🛡️ Remediation Tracker</span>
    <div class="d-flex align-items-center gap-3">
        <span class="text-white">Hello, <strong sec:authentication="name"></strong></span>

        <!-- All roles see the main vulnerabilities list -->
        <a th:href="@{/vulnerabilities}" class="btn btn-outline-light btn-sm">Vulnerabilities</a>

        <!--
            DEVELOPER gets a direct link to THEIR assigned list.
            sec:authorize hides/shows based on role — pure UI convenience,
            the controller enforces access regardless.
        -->
        <a th:href="@{/dev/my-vulnerabilities}" class="btn btn-outline-light btn-sm"
           sec:authorize="hasRole('DEVELOPER')">My Assigned</a>

        <!-- Audit logs: ADMIN and ANALYST only -->
        <a th:href="@{/audit}" class="btn btn-outline-light btn-sm"
           sec:authorize="hasAnyRole('ADMIN', 'ANALYST')">Audit Logs</a>

        <!-- User management: ADMIN only -->
        <a th:href="@{/admin/users}" class="btn btn-outline-warning btn-sm"
           sec:authorize="hasRole('ADMIN')">Manage Users</a>

        <form th:action="@{/logout}" method="post" class="m-0">
            <button class="btn btn-outline-danger btn-sm" type="submit">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-4">

    <h3>Dashboard</h3>
    <p class="text-muted">Welcome back. Here's a summary of the current vulnerability status.</p>

    <!-- Summary stat cards -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card text-white bg-secondary">
                <div class="card-body">
                    <h6 class="card-title">Total</h6>
                    <h2 th:text="${totalCount}">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-danger">
                <div class="card-body">
                    <h6 class="card-title">Critical</h6>
                    <h2 th:text="${criticalCount}">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-warning">
                <div class="card-body">
                    <h6 class="card-title">High</h6>
                    <h2 th:text="${highCount}">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-success">
                <div class="card-body">
                    <h6 class="card-title">Resolved</h6>
                    <h2 th:text="${resolvedCount}">0</h2>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick action buttons — role-appropriate -->
    <div class="d-flex gap-2 flex-wrap">

        <a th:href="@{/vulnerabilities}" class="btn btn-primary">View All Vulnerabilities</a>

        <!-- Create button: ADMIN and ANALYST only -->
        <a th:href="@{/vulnerabilities/new}" class="btn btn-success"
           sec:authorize="hasAnyRole('ADMIN', 'ANALYST')">+ New Vulnerability</a>

        <!-- Developer shortcut to their own list -->
        <a th:href="@{/dev/my-vulnerabilities}" class="btn btn-outline-primary"
           sec:authorize="hasRole('DEVELOPER')">My Assigned Vulnerabilities →</a>

        <!-- Admin shortcut to user management -->
        <a th:href="@{/admin/users}" class="btn btn-outline-warning"
           sec:authorize="hasRole('ADMIN')">Manage Users →</a>

    </div>

</div>
</body>
</html>
