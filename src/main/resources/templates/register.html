<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register – Remediation Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow" style="width: 450px;">
        <div class="card-body p-4">

            <h4 class="card-title text-center mb-4">📝 Create Account</h4>

            <!-- Error message sent from controller -->
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <!--
                th:action="@{/register}" → POST to /register
                th:object="${user}" → binds this form to the User object the controller put in the model
            -->
            <form th:action="@{/register}" th:object="${user}" method="post">

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <!--
                        th:field="*{username}" automatically sets id, name, and value
                        from the User object's username field
                    -->
                    <input type="text" class="form-control" th:field="*{username}" required>
                    <!-- Show validation error for this field if present -->
                    <span class="text-danger" th:if="${#fields.hasErrors('username')}"
                          th:errors="*{username}"></span>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" th:field="*{email}" required>
                    <span class="text-danger" th:if="${#fields.hasErrors('email')}"
                          th:errors="*{email}"></span>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" th:field="*{password}" required>
                    <span class="text-danger" th:if="${#fields.hasErrors('password')}"
                          th:errors="*{password}"></span>
                </div>

                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <!--
                        th:field="*{role}" binds to User.role
                        The values must match your Role enum exactly: ADMIN, ANALYST, DEVELOPER
                    -->
                    <select class="form-select" th:field="*{role}" required>
                        <option value="">-- Select Role --</option>
                        <option value="ADMIN">Admin</option>
                        <option value="ANALYST">Analyst</option>
                        <option value="DEVELOPER">Developer</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-success w-100">Register</button>
            </form>

            <hr>
            <p class="text-center mb-0">
                Already have an account? <a th:href="@{/login}">Login</a>
            </p>
        </div>
    </div>
</div>

</body>
</html>
